<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 知識王 | 薩爾達風</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* 新海誠風格色系：黃昏、星空、柔和光暈 */
    --sky-top: #0a1128;
    --sky-mid: #1c325b;
    --sky-horizon: #8a5a7a;
    --sky-bottom: #f2a68d;
    
    --primary: #ffd3b6;
    --secondary: #a8edea;
    --accent: #ff9a9e;
    --success: #a8e6cf;
    --danger: #ff8b94;
    --warning: #ffebd2;
    
    --text-main: #ffffff;
    --text-muted: #e2e8f0;
    
    /* 輕透毛玻璃 */
    --glass-bg: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.25);
    --glass-shadow: 0 8px 32px 0 rgba(10, 17, 40, 0.4);
    --glass-panel-bg: rgba(10, 17, 40, 0.35); /* 面板底色稍微加深以突顯白字 */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background-color: var(--sky-top);
    color: var(--text-main);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* ── 動態新海誠背景 ── */
  .bg-animation {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 40%, var(--sky-horizon) 75%, var(--sky-bottom) 100%);
  }

  /* 星星 */
  .stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
    background-repeat: repeat;
    background-size: 200px 200px;
    opacity: 0.6;
    animation: twinkle 4s infinite alternate;
  }

  /* 流星 */
  .shooting-star {
    position: absolute;
    top: 50px;
    left: 80%;
    width: 150px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), #fff);
    transform: rotate(-45deg);
    opacity: 0;
    animation: shooting 6s infinite;
  }
  .shooting-star::before {
    content: '';
    position: absolute;
    right: 0;
    top: -4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 15px 3px #fff;
  }
  .shooting-star-2 {
    top: -50px; left: 40%;
    animation-delay: 3s;
    animation-duration: 8s;
  }

  /* 雲朵光暈 */
  .cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.3;
    animation: float 25s infinite alternate ease-in-out;
  }
  .cloud-1 { width: 400px; height: 150px; background: #ffb199; bottom: 10%; left: -10%; animation-delay: 0s; }
  .cloud-2 { width: 350px; height: 120px; background: #a8edea; top: 30%; right: -15%; animation-delay: -5s; }

  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, -20px) scale(1.1); }
  }
  @keyframes twinkle {
    0% { opacity: 0.4; }
    100% { opacity: 0.8; }
  }
  @keyframes shooting {
    0% { transform: translate(0, 0) rotate(-45deg); opacity: 0; }
    5% { opacity: 1; }
    20% { transform: translate(-300px, 300px) rotate(-45deg); opacity: 0; }
    100% { opacity: 0; }
  }

  /* ── 主容器 ── */
  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
  }

  /* ── 畫面切換 ── */
  .screen { display: none; flex-direction: column; flex: 1; width: 100%; }
  .screen.active { display: flex; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── 玻璃擬物化共用元件 ── */
  .glass-panel {
    background: var(--glass-panel-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    box-shadow: var(--glass-shadow);
  }

  /* ══════════════════════════════
     首頁 (Home)
  ══════════════════════════════ */
  #home {
    justify-content: center; align-items: center;
    gap: 24px;
  }

  .logo-container { text-align: center; margin-bottom: 5px; }
  .logo {
    font-family: 'Zen Dots', cursive;
    font-size: clamp(2.5rem, 12vw, 3.5rem);
    background: linear-gradient(135deg, #fff, var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
    filter: drop-shadow(0 0 10px rgba(255, 211, 182, 0.4));
  }
  .subtitle {
    color: var(--primary); font-size: 0.95rem; font-weight: 500; letter-spacing: 0.15em;
    margin-top: 5px;
  }

  /* API Key 設定區塊 */
  .api-key-section {
    width: 100%;
    display: flex; flex-direction: column; gap: 8px;
  }
  .api-input-wrap {
    position: relative; width: 100%;
  }
  .api-input {
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: var(--text-main);
    font-size: 0.85rem;
    padding: 12px 16px;
    outline: none;
    transition: all 0.3s;
    font-family: monospace;
  }
  .api-input:focus {
    border-color: var(--primary);
    background: rgba(0,0,0,0.3);
    box-shadow: 0 0 10px rgba(255,211,182,0.2);
  }
  .api-hint {
    font-size: 0.75rem; color: var(--text-muted); text-align: right;
  }
  .api-hint a { color: var(--primary); text-decoration: none; }

  /* 輸入區塊 */
  .input-group { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 0.85rem; color: var(--primary); font-weight: 700; letter-spacing: 0.05em; }
  
  .topic-input-wrap { position: relative; width: 100%; }
  .topic-input {
    width: 100%;
    background: var(--glass-bg);
    border: 1.5px solid var(--glass-border);
    border-radius: 16px;
    color: var(--text-main);
    font-size: 1.1rem;
    padding: 16px 48px 16px 20px;
    outline: none;
    transition: all 0.3s;
  }
  .topic-input:focus {
    background: rgba(255,255,255,0.15);
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(255, 211, 182, 0.2);
  }
  .topic-input::placeholder { color: rgba(255,255,255,0.4); }
  .clear-btn {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.2); border: none; border-radius: 50%;
    width: 24px; height: 24px; color: var(--text-main);
    font-size: 0.8rem; cursor: pointer; display: none;
    align-items: center; justify-content: center; transition: 0.2s;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.3); }

  /* 標籤 */
  .chips { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
  .chip {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 8px 16px;
    font-size: 0.85rem; cursor: pointer; color: var(--text-main);
    transition: all 0.3s ease;
  }
  .chip:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
  .chip.active {
    background: rgba(255, 211, 182, 0.25);
    border-color: var(--primary);
    color: var(--primary);
    box-shadow: 0 0 10px rgba(255,211,182,0.3);
  }

  /* 難度按鈕 */
  .diff-row { display: flex; gap: 12px; width: 100%; }
  .diff-btn {
    flex: 1; padding: 12px; border-radius: 14px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: var(--text-main); font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: all 0.3s ease;
  }
  .diff-btn.active {
    background: linear-gradient(135deg, rgba(255,211,182,0.3), rgba(168,237,234,0.3));
    border-color: var(--primary); color: #fff;
    box-shadow: inset 0 0 20px rgba(255,211,182,0.15);
  }

  /* 啟動按鈕 */
  .start-btn {
    width: 100%; padding: 18px; margin-top: 10px;
    background: linear-gradient(135deg, var(--accent), var(--primary));
    border: none; border-radius: 16px;
    color: #fff; font-size: 1.1rem; font-weight: 900;
    cursor: pointer; letter-spacing: 0.05em;
    box-shadow: 0 8px 24px rgba(255, 154, 158, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  .start-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(255, 154, 158, 0.5); }
  .start-btn:active:not(:disabled) { transform: translateY(1px); }
  .start-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; box-shadow: none; }

  /* ══════════════════════════════
     載入中 (Loading)
  ══════════════════════════════ */
  #loading { justify-content: center; align-items: center; gap: 30px; text-align: center; }
  
  .loader-container { position: relative; width: 100px; height: 100px; }
  .loader-circle {
    position: absolute; inset: 0;
    border: 3px solid transparent;
    border-top-color: var(--primary);
    border-bottom-color: var(--accent);
    border-radius: 50%;
    animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
  }
  .loader-circle:nth-child(2) { inset: 15px; animation-duration: 2s; animation-direction: reverse; border-width: 2px;}
  .loader-icon {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 2rem; animation: pulse 2s infinite;
  }
  
  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

  .loading-text { font-size: 1.1rem; color: var(--text-main); font-weight: 500; }
  .loading-topic { 
    font-size: 1.5rem; font-weight: 900; margin-top: 8px;
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
  }

  /* ══════════════════════════════
     遊戲畫面 (Game)
  ══════════════════════════════ */
  #game { gap: 20px; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; }
  .status-info { display: flex; flex-direction: column; gap: 4px; }
  .q-counter { font-family: 'Zen Dots', cursive; font-size: 0.85rem; color: var(--primary); }
  .score-display { font-family: 'Zen Dots', cursive; font-size: 1.1rem; color: var(--warning); text-shadow: 0 0 10px rgba(255,235,210,0.4); }

  /* 進度條 */
  .progress-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-bottom: 10px;}
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--primary)); border-radius: 10px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; box-shadow: 0 0 10px var(--primary); }

  /* 酷炫計時器 */
  .timer-wrap { position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
  .timer-svg { position: absolute; inset: 0; transform: rotate(-90deg); width: 100%; height: 100%; }
  .timer-svg circle { fill: none; stroke-width: 4; stroke-linecap: round; }
  .timer-bg { stroke: rgba(255,255,255,0.1); }
  .timer-fg { 
    stroke: var(--primary); 
    stroke-dasharray: 163; /* 2 * PI * 26 */
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease; 
  }
  .timer-num { font-family: 'Zen Dots', cursive; font-size: 1.2rem; color: var(--text-main); position: relative; z-index: 2; }

  .question-card { padding: 24px; min-height: 140px; display: flex; align-items: center; justify-content: center; }
  .question-text { font-size: 1.15rem; line-height: 1.6; font-weight: 700; text-align: center; }

  .options { display: flex; flex-direction: column; gap: 14px; }
  .opt-btn {
    width: 100%; padding: 16px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 16px; color: var(--text-main);
    font-size: 1rem; line-height: 1.5; text-align: left;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .opt-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); transform: translateX(5px); border-color: rgba(255,255,255,0.4); }
  .opt-btn:active:not(:disabled) { transform: scale(0.98); }

  .opt-label {
    flex-shrink: 0; width: 32px; height: 32px;
    border-radius: 10px; background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Zen Dots', cursive; font-size: 0.9rem; color: var(--text-main);
    transition: all 0.3s;
  }

  /* 答題狀態 */
  .opt-btn.correct { background: rgba(168, 230, 207, 0.25); border-color: var(--success); box-shadow: 0 0 15px rgba(168,230,207,0.3); }
  .opt-btn.correct .opt-label { background: var(--success); color: #000; }
  
  .opt-btn.wrong { background: rgba(255, 139, 148, 0.25); border-color: var(--danger); box-shadow: 0 0 15px rgba(255,139,148,0.3); }
  .opt-btn.wrong .opt-label { background: var(--danger); color: #fff; }
  
  .opt-btn.disabled { opacity: 0.5; cursor: default; }

  .explanation-card {
    margin-top: 10px; padding: 16px 20px;
    background: rgba(255, 211, 182, 0.1);
    border-left: 4px solid var(--primary);
    display: none; animation: fadeUp 0.4s ease forwards;
  }
  .explanation-card.show { display: block; }
  .explanation-title { font-size: 0.85rem; color: var(--primary); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.1em;}
  .explanation-text { font-size: 0.95rem; line-height: 1.6; color: var(--text-main); }

  .action-btn {
    width: 100%; padding: 16px; margin-top: auto;
    background: transparent; border: 2px solid var(--primary);
    border-radius: 16px; color: var(--primary);
    font-size: 1.05rem; font-weight: 700; cursor: pointer;
    transition: all 0.3s; display: none;
  }
  .action-btn.show { display: block; animation: fadeUp 0.4s ease; }
  .action-btn:hover { background: rgba(255,211,182,0.15); box-shadow: 0 0 15px rgba(255,211,182,0.3); color: #fff; border-color: #fff;}

  /* ══════════════════════════════
     結果畫面 (Result)
  ══════════════════════════════ */
  #result { justify-content: center; align-items: center; gap: 24px; text-align: center; }

  .result-icon { font-size: 5rem; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); animation: bounce 2s infinite ease-in-out; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  .result-title { font-family: 'Zen Dots', cursive; font-size: 1.8rem; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .score-box { padding: 30px; width: 100%; position: relative; overflow: hidden; }
  .score-box::before { content: ''; position: absolute; inset: -50%; background: conic-gradient(from 0deg, transparent, var(--warning), transparent 30%); animation: spin 4s linear infinite; opacity: 0.15; }
  .score-big { position: relative; font-family: 'Zen Dots', cursive; font-size: 4.5rem; color: var(--warning); text-shadow: 0 0 30px rgba(255,235,210,0.5); line-height: 1; margin-bottom: 5px; }
  .score-label { position: relative; color: var(--text-main); font-size: 0.9rem; letter-spacing: 0.15em; font-weight: 700;}

  .stats-grid { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-card { padding: 16px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .stat-num { font-family: 'Zen Dots', cursive; font-size: 1.5rem; }
  .stat-label { font-size: 0.8rem; color: var(--text-main); opacity: 0.8;}
  .c-correct { color: var(--success); }
  .c-wrong { color: var(--danger); }
  .c-time { color: var(--primary); }

  .btn-group { display: flex; gap: 16px; width: 100%; margin-top: 10px; }
  .btn-primary { flex: 2; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--primary)); border: none; border-radius: 16px; color: #fff; font-size: 1.05rem; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(255,154,158,0.3); text-shadow: 0 1px 2px rgba(0,0,0,0.2);}
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,154,158,0.5); }
  .btn-secondary { flex: 1; padding: 16px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 16px; color: var(--text-main); font-size: 0.95rem; cursor: pointer; transition: 0.3s; }
  .btn-secondary:hover { background: rgba(255,255,255,0.2); border-color: #fff; }

  /* ── 星辰紙花 (Confetti) ── */
  .confetti { position: fixed; top: -10px; width: 10px; height: 10px; border-radius: 50%; animation: fall linear forwards; z-index: 999; pointer-events: none; box-shadow: 0 0 10px currentColor; }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  .footer { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 20px; font-family: 'Zen Dots', sans-serif;}

/* ══════════════════════════════
   薩爾達風 UI 覆蓋
══════════════════════════════ */
:root{
  --sky-top:#0b1d12;
  --sky-mid:#183c2b;
  --sky-horizon:#7a6a3a;
  --sky-bottom:#caa96b;

  --primary:#f7d98a;
  --secondary:#89c9a8;
  --accent:#d4a44c;
  --success:#84c98f;
  --danger:#d46a5e;
  --warning:#ffe9a8;

  --text-main:#f8f1d4;
  --text-muted:#d8cfb0;

  --glass-bg:rgba(34, 52, 35, 0.52);
  --glass-border:rgba(247, 217, 138, 0.25);
  --glass-shadow:0 10px 35px rgba(0,0,0,0.45);
  --glass-panel-bg:rgba(20, 34, 23, 0.68);
}

body{
  background:
    radial-gradient(circle at top, rgba(247,217,138,0.12), transparent 30%),
    linear-gradient(180deg,#08140d 0%,#13281d 45%,#3f4a25 100%);
}

.bg-animation{
  background:
    linear-gradient(180deg, rgba(6,14,10,0.95) 0%, rgba(18,42,28,0.92) 45%, rgba(78,92,46,0.85) 100%);
}

.stars{
  opacity:0.25;
  filter:drop-shadow(0 0 6px rgba(247,217,138,0.5));
}

.cloud{
  filter: blur(90px);
}

.cloud-1{
  background:#6ca26f;
}

.cloud-2{
  background:#d6b86b;
}

.logo{
  font-family:'Noto Sans TC', sans-serif;
  font-weight:900;
  letter-spacing:0.08em;
  background:linear-gradient(180deg,#fff5c9 0%, #f0c86f 60%, #c9983f 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 18px rgba(255,221,120,0.25);
}

.subtitle,
.label,
.q-counter{
  color:#f7d98a;
}

.glass-panel,
.opt-btn,
.diff-btn,
.chip,
.topic-input,
.api-input{
  background:
    linear-gradient(180deg, rgba(45,62,39,0.88), rgba(26,39,29,0.92));
  border:2px solid rgba(247,217,138,0.18);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.03),
    0 8px 24px rgba(0,0,0,0.35);
}

.question-card,
.score-box{
  position:relative;
  overflow:hidden;
}

.question-card::before,
.score-box::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  padding:2px;
  background:linear-gradient(135deg, rgba(247,217,138,0.6), transparent, rgba(137,201,168,0.35));
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  pointer-events:none;
}

.start-btn,
.btn-primary{
  background:
    linear-gradient(180deg,#e5c36d 0%, #b78532 100%);
  color:#2a1c05;
  border:2px solid rgba(255,236,170,0.4);
  text-shadow:none;
  box-shadow:0 10px 28px rgba(0,0,0,0.4);
}

.start-btn:hover:not(:disabled),
.btn-primary:hover{
  filter:brightness(1.08);
}

.action-btn,
.btn-secondary{
  border:2px solid rgba(247,217,138,0.4);
  color:#f7d98a;
}

.opt-label{
  background:rgba(247,217,138,0.12);
  border:1px solid rgba(247,217,138,0.2);
  color:#ffe9a8;
}

.progress-fill{
  background:linear-gradient(90deg,#d6b86b,#f7d98a,#89c9a8);
}

.timer-fg{
  stroke:#f7d98a;
}

.footer{
  color:rgba(247,217,138,0.45);
  letter-spacing:0.15em;
}

.result-title,
.loading-topic{
  background:linear-gradient(180deg,#fff5d1,#f0c86f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.explanation-card{
  background:rgba(247,217,138,0.08);
  border-left:4px solid #f7d98a;
}

.chip.active,
.diff-btn.active{
  background:linear-gradient(135deg, rgba(247,217,138,0.22), rgba(137,201,168,0.16));
  border-color:#f7d98a;
}

.result-icon{
  filter:drop-shadow(0 0 20px rgba(247,217,138,0.35));
}

</style>
</head>
<body>

<!-- 動態新海誠背景 -->
<div class="bg-animation">
  <div class="stars"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star shooting-star-2"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
</div>

<div id="app">
  <!-- ════ 首頁 ════ -->
  <div id="home" class="screen active">
    <div class="logo-container">
      <div class="logo">AI 知識王</div>
      <div class="subtitle">POWERED BY GEMINI</div>
    </div>

    <!-- API Key 設定 -->
    <div class="api-key-section">
      <div class="label">⚙️ API 金鑰設定 (僅儲存於本地)</div>
      <div class="api-input-wrap">
        <input type="password" id="apiKeyInput" class="api-input" placeholder="輸入您的 Gemini API Key...">
      </div>
      <div class="api-hint">
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">取得免費 API Key →</a>
      </div>
    </div>

    <div class="input-group">
      <div class="label">🎯 挑戰主題</div>
      <div class="topic-input-wrap">
        <input id="topicInput" class="topic-input" type="text" placeholder="輸入任意想挑戰的領域..." maxlength="40">
        <button class="clear-btn" id="clearBtn">✕</button>
      </div>
    </div>

    <div class="chips">
      <div class="chip" data-topic="K-pop女團">🎤 K-pop女團</div>
      <div class="chip" data-topic="好萊塢電影">🎬 好萊塢電影</div>
      <div class="chip" data-topic="台灣法律常識">⚖️ 台灣法律</div>
      <div class="chip" data-topic="世界歷史">🌍 世界歷史</div>
      <div class="chip" data-topic="科學與科技">🔬 科學科技</div>
      <div class="chip" data-topic="台灣美食">🍜 台灣美食</div>
      <div class="chip" data-topic="程式語言">💻 程式語言</div>
    </div>

    <div class="input-group">
      <div class="label">⚡ 難易度</div>
      <div class="diff-row">
        <button class="diff-btn active" data-diff="簡單">🌱 簡單</button>
        <button class="diff-btn" data-diff="普通">⚔️ 普通</button>
        <button class="diff-btn" data-diff="困難">🔥 困難</button>
      </div>
    </div>

    <button class="start-btn" id="startBtn" disabled>踏上海拉魯試煉 ⚔️</button>
    <div class="footer">v4.0 • HYRULE STYLE</div>
  </div>

  <!-- ════ 載入中 ════ -->
  <div id="loading" class="screen">
    <div class="loader-container">
      <div class="loader-circle"></div>
      <div class="loader-circle"></div>
      <div class="loader-icon">✨</div>
    </div>
    <div>
      <div class="loading-text">希卡之石正在生成</div>
      <div class="loading-topic" id="loadingTopic"></div>
      <div class="loading-text" style="margin-top:8px">的古代試煉...</div>
    </div>
  </div>

  <!-- ════ 遊戲畫面 ════ -->
  <div id="game" class="screen">
    <div class="top-bar">
      <div class="status-info">
        <div class="q-counter" id="qCounter">Q 1 / 10</div>
        <div class="score-display" id="scoreDisplay">SCORE: 0</div>
      </div>
      <div class="timer-wrap">
        <svg class="timer-svg" viewBox="0 0 56 56">
          <circle class="timer-bg" cx="28" cy="28" r="26"></circle>
          <circle class="timer-fg" id="timerRing" cx="28" cy="28" r="26"></circle>
        </svg>
        <div class="timer-num" id="timerNum">15</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressBar"></div>
    </div>

    <div class="glass-panel question-card">
      <div class="question-text" id="questionText"></div>
    </div>

    <div class="options" id="optionsContainer"></div>

    <div class="glass-panel explanation-card" id="explanationBox">
      <div class="explanation-title">💡 AI 解析</div>
      <div class="explanation-text" id="explanationText"></div>
    </div>

    <button class="action-btn" id="nextBtn">下一題 →</button>
  </div>

  <!-- ════ 結果畫面 ════ -->
  <div id="result" class="screen">
    <div class="result-icon" id="resultEmoji">🏆</div>
    <div class="result-title" id="resultTitle">完美過關</div>
    
    <div class="glass-panel score-box">
      <div class="score-big" id="scoreBig">100</div>
      <div class="score-label">FINAL SCORE</div>
    </div>

    <div class="stats-grid">
      <div class="glass-panel stat-card">
        <div class="stat-num c-correct" id="correctCount">10</div>
        <div class="stat-label">答對</div>
      </div>
      <div class="stat-card glass-panel">
        <div class="stat-num c-wrong" id="wrongCount">0</div>
        <div class="stat-label">答錯</div>
      </div>
      <div class="stat-card glass-panel">
        <div class="stat-num c-time" id="avgTime">8s</div>
        <div class="stat-label">平均作答</div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn-primary" id="replayBtn">再戰一次 ↺</button>
      <button class="btn-secondary" id="changeTopicBtn">更換主題</button>
    </div>
  </div>
</div>

<script>
// ─── 系統設定 ───────────────────────────────
// 此為 Canvas 環境專用的保留變數，在 GitHub 環境中會被忽略，主要使用 localStorage 的 Key
const apiKey = ""; 

const TOTAL_Q    = 10; // 10 題
const TIME_LIMIT = 15;
const CIRCUMFERENCE = 2 * Math.PI * 26; // 半徑 26

// ─── 狀態管理 ───────────────────────────────
let questions    = [];
let currentQ     = 0;
let score        = 0;
let correctCount = 0;
let wrongCount   = 0;
let timeTaken    = [];
let timerInterval= null;
let timeLeft     = TIME_LIMIT;
let answered     = false;
let difficulty   = '簡單';
let topic        = '';

// ─── DOM 元素與工具 ────────────────────────────────
const $ = id => document.getElementById(id);
const screens = () => document.querySelectorAll('.screen');

function showScreen(id) {
  screens().forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ─── 初始化與事件綁定 ────────────────────────
const apiKeyInput= $('apiKeyInput');
const topicInput = $('topicInput');
const clearBtn   = $('clearBtn');
const startBtn   = $('startBtn');

// 讀取本地儲存的 API Key
window.addEventListener('DOMContentLoaded', () => {
  const savedKey = localStorage.getItem('gemini_quiz_api_key');
  if (savedKey) apiKeyInput.value = savedKey;
});

// 儲存 API Key
apiKeyInput.addEventListener('input', () => {
  localStorage.setItem('gemini_quiz_api_key', apiKeyInput.value.trim());
});

topicInput.addEventListener('input', () => {
  clearBtn.style.display = topicInput.value ? 'flex' : 'none';
  updateStartBtn();
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
});

clearBtn.addEventListener('click', () => {
  topicInput.value = ''; 
  clearBtn.style.display = 'none'; 
  updateStartBtn();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    topicInput.value = chip.dataset.topic;
    clearBtn.style.display = 'flex';
    updateStartBtn();
  });
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
  });
});

function updateStartBtn() {
  startBtn.disabled = !topicInput.value.trim();
}

startBtn.addEventListener('click', startGame);
$('nextBtn').addEventListener('click', nextQuestion);
$('replayBtn').addEventListener('click', () => startGame());
$('changeTopicBtn').addEventListener('click', () => showScreen('home'));

// ─── 開始遊戲 ────────────────────────────
async function startGame() {
  const userKey = apiKeyInput.value.trim();
  const finalKey = userKey || apiKey; // 優先使用使用者輸入，若無則嘗試環境變數

  if (!finalKey) {
    alert('⚠️ 請先輸入 Gemini API Key！\n如果您是從 GitHub 存取，請在上方欄位貼上您的金鑰。');
    apiKeyInput.focus();
    return;
  }

  topic        = topicInput.value.trim();
  questions    = [];
  currentQ     = 0;
  score        = 0;
  correctCount = 0;
  wrongCount   = 0;
  timeTaken    = [];

  $('loadingTopic').textContent = `「${topic}」`;
  showScreen('loading');

  try {
    questions = await fetchGeminiQuestions(topic, difficulty, finalKey);
    showScreen('game');
    renderQuestion();
  } catch(e) {
    console.error(e);
    alert('⚠️ 出題失敗：\n' + e.message + '\n\n請確認 API Key 是否正確或網路連線。');
    showScreen('home');
  }
}

// ─── 呼叫 Gemini API (使用結構化 JSON 輸出) ───
async function fetchGeminiQuestions(topic, difficulty, key) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
  
  const prompt = `你是專業的測驗出題大師。請根據主題：「${topic}」產生剛好 ${TOTAL_Q} 題單選題。
難度：${difficulty}。
語言：繁體中文。
規則：
- 每題提供 4 個選項。
- 必須有 1 個正確答案。
- 提供簡短的解釋（1-2句話說明為何該選項正確）。
- 題目內容必須符合客觀事實。`;

  const payload = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      responseMimeType: "application/json",
      responseSchema: {
        type: "ARRAY",
        items: {
          type: "OBJECT",
          properties: {
            q: { type: "STRING", description: "題目文字" },
            options: { type: "ARRAY", items: { type: "STRING" }, description: "4個選項的文字陣列" },
            answer: { type: "INTEGER", description: "正確答案的索引值 (0 到 3)" },
            explanation: { type: "STRING", description: "針對正確答案的解析說明" }
          },
          required: ["q", "options", "answer", "explanation"]
        }
      }
    }
  };

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    const errorData = await response.json();
    throw new Error(errorData.error?.message || `HTTP Error ${response.status}`);
  }

  const data = await response.json();
  const resultText = data.candidates[0].content.parts[0].text;
  return JSON.parse(resultText);
}

// ─── 渲染題目 ────────────────────────────
function renderQuestion() {
  answered = false;
  const q  = questions[currentQ];

  // 更新進度與標頭
  const pct = (currentQ / TOTAL_Q) * 100;
  $('progressBar').style.width = pct + '%';
  $('qCounter').textContent    = `Q ${currentQ + 1} / ${TOTAL_Q}`;
  $('scoreDisplay').textContent= `SCORE: ${score}`;
  $('questionText').textContent= q.q;
  
  $('explanationBox').classList.remove('show');
  $('nextBtn').classList.remove('show');

  // 渲染選項
  const labels = ['A', 'B', 'C', 'D'];
  const cont   = $('optionsContainer');
  cont.innerHTML = '';
  
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn glass-panel';
    btn.innerHTML = `<div class="opt-label">${labels[i]}</div><div style="flex:1">${opt}</div>`;
    btn.addEventListener('click', () => handleAnswer(i, btn));
    cont.appendChild(btn);
  });

  // 啟動計時器
  startTimer();
}

// ─── 計時器邏輯 ──────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIME_LIMIT;
  updateTimerUI();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) handleAnswer(-1, null); // 時間到，視為答錯
    }
  }, 1000);
}

function updateTimerUI() {
  $('timerNum').textContent = timeLeft;
  const ring = $('timerRing');
  // 計算周長偏移量
  const offset = CIRCUMFERENCE * (1 - timeLeft / TIME_LIMIT);
  ring.style.strokeDashoffset = offset;
  
  if (timeLeft <= 5) {
    ring.style.stroke = 'var(--danger)';
    $('timerNum').style.color = 'var(--danger)';
  } else {
    ring.style.stroke = 'var(--primary)';
    $('timerNum').style.color = 'var(--text-main)';
  }
}

// ─── 處理作答 ────────────────────────────
function handleAnswer(chosen, clickedBtn) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const elapsed = TIME_LIMIT - timeLeft;
  if(chosen !== -1) timeTaken.push(elapsed);

  const q       = questions[currentQ];
  const correct = q.answer;
  const btns    = $('optionsContainer').querySelectorAll('.opt-btn');

  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.disabled = true;
    if (i === correct) {
      btn.classList.remove('disabled');
      btn.classList.add('correct');
    } else if (i === chosen) {
      btn.classList.remove('disabled');
      btn.classList.add('wrong');
    }
  });

  // 計分邏輯：基礎分100 + 剩餘時間加權
  if (chosen === correct) {
    correctCount++;
    const bonus = Math.floor((timeLeft / TIME_LIMIT) * 50);
    score += (100 + bonus);
  } else {
    wrongCount++;
  }

  // 顯示 AI 解析
  $('explanationText').textContent = q.explanation;
  $('explanationBox').classList.add('show');

  // 顯示下一題按鈕
  $('nextBtn').textContent = currentQ < TOTAL_Q - 1 ? '下一題 →' : '查看成績 🏆';
  $('nextBtn').classList.add('show');
}

// ─── 切換題目 ──────────────────────────────
function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL_Q) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ─── 結果結算 ────────────────────────────────
function showResult() {
  const avg = timeTaken.length
    ? (timeTaken.reduce((a,b)=>a+b,0) / timeTaken.length).toFixed(1)
    : 0;

  const pct = correctCount / TOTAL_Q;
  let emoji, title;
  if (pct === 1)     { emoji = '🌟'; title = '奇蹟發生了'; }
  else if (pct >= .8){ emoji = '✨'; title = '星空璀璨'; }
  else if (pct >= .6){ emoji = '🌠'; title = '劃過天際'; }
  else if (pct >= .4){ emoji = '⛅'; title = '雲層遮蔽'; }
  else               { emoji = '🌧️'; title = '大雨磅礡'; }

  $('resultEmoji').textContent  = emoji;
  $('resultTitle').textContent  = title;
  
  // 分數動畫
  let currentScore = 0;
  const targetScore = score;
  const scoreDisplay = $('scoreBig');
  const duration = 1000;
  const stepTime = 20;
  const steps = duration / stepTime;
  const increment = targetScore / steps;
  
  const timer = setInterval(() => {
    currentScore += increment;
    if(currentScore >= targetScore) {
      currentScore = targetScore;
      clearInterval(timer);
    }
    scoreDisplay.textContent = Math.floor(currentScore);
  }, stepTime);

  $('correctCount').textContent = correctCount;
  $('wrongCount').textContent   = wrongCount;
  $('avgTime').textContent      = avg + 's';

  showScreen('result');
  if (pct >= .6) launchConfetti();
}

// ─── 慶祝星辰紙花特效 ────────────────────────────────
function launchConfetti() {
  const colors = ['#ffd3b6', '#a8edea', '#ff9a9e', '#a8e6cf', '#ffebd2', '#ffffff'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      color: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${4+Math.random()*6}px;
      height: ${4+Math.random()*6}px;
      animation-duration: ${1.5+Math.random()*3}s;
      animation-delay: ${Math.random()*0.5}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }
}
</script>
</body>
